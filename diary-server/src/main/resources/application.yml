spring:
  application:
    name: diary-server
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

diary:
  jwt:
    secret: change-me-to-a-long-random-string-at-least-32-chars
    expiration-hours: 168
  wechat:
    app-id: ${WECHAT_APP_ID:}
    app-secret: ${WECHAT_APP_SECRET:}
    dev-mode: ${WECHAT_DEV_MODE:true}
